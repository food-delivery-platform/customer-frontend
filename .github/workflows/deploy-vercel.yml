name: Deploy Next.js to Vercel

on:
  push:
    branches:
      - main

  # Позволяет запустить deployment вручную из GitHub при необходимости.
  workflow_dispatch:

permissions:
  contents: read

# Не позволяет двум production deployments выполняться одновременно.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run type check
        run: npm run typecheck --if-present

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production

      - name: Build application
        run: npx vercel@latest build --prod

      - name: Deploy to production
        run: npx vercel@latest deploy --prebuilt --prod