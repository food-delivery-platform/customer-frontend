name: Deploy to Vercel

on:
  workflow_run:
    workflows:
      - Checks
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest

    # Не запускаем deployment, если lint или typecheck завершились с ошибкой.
    if: github.event.workflow_run.conclusion == 'success'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TELEMETRY_DISABLED: 1
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_API_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}

    steps:
      - name: Checkout checked commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync production environment variables
        shell: bash
        run: |
          set -euo pipefail

          sync_vercel_env() {
            local name="$1"
            local value="$2"
            local sensitive_flag="${3:-}"

            if [[ -z "$value" ]]; then
              echo "Missing required GitHub secret: $name" >&2
              exit 1
            fi

            printf '%s' "$value" | npx --yes vercel@latest env add "$name" production --force $sensitive_flag
          }

          sync_vercel_env "AUTH_SECRET" "$AUTH_SECRET" "--sensitive"
          sync_vercel_env "AUTH_GOOGLE_ID" "$AUTH_GOOGLE_ID"
          sync_vercel_env "AUTH_GOOGLE_SECRET" "$AUTH_GOOGLE_SECRET" "--sensitive"

          if [[ -n "$NEXT_PUBLIC_API_BASE_URL" ]]; then
            sync_vercel_env "NEXT_PUBLIC_API_BASE_URL" "$NEXT_PUBLIC_API_BASE_URL"
          fi

          if [[ -n "$NEXT_PUBLIC_API_GATEWAY_URL" ]]; then
            sync_vercel_env "NEXT_PUBLIC_API_GATEWAY_URL" "$NEXT_PUBLIC_API_GATEWAY_URL"
          fi

      - name: Pull Vercel configuration
        run: >
          npx --yes vercel@latest pull
          --yes
          --environment=production

      - name: Build application
        run: >
          npx --yes vercel@latest build
          --prod

      - name: Deploy to production
        run: >
          npx --yes vercel@latest deploy
          --prebuilt
          --prod
