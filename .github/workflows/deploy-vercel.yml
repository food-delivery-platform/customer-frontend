name: Check and deploy Next.js

# Запускается при push в любую ветку.
on:
  push:

permissions:
  contents: read

jobs:
  check:
    name: Lint and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    # Ждём успешного завершения линтера и typecheck.
    needs: check

    # Деплоим только push в main.
    if: github.ref == 'refs/heads/main'

    # Если в main быстро пришло несколько коммитов,
    # отменяем устаревший deployment.
    concurrency:
      group: vercel-production
      cancel-in-progress: true

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel configuration
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build application
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"Ы