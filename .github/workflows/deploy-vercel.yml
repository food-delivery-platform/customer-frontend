name: Deploy to Vercel

on:
  workflow_run:
    workflows:
      - Checks
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest

    # Не запускаем deployment, если lint или typecheck завершились с ошибкой.
    if: github.event.workflow_run.conclusion == 'success'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout checked commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel configuration
        run: >
          npx --yes vercel@latest pull
          --yes
          --environment=production

      - name: Build application
        run: >
          npx --yes vercel@latest build
          --prod

      - name: Deploy to production
        run: >
          npx --yes vercel@latest deploy
          --prebuilt
          --prod
